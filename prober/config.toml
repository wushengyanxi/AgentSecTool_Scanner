# ocprobe 默认配置。命令行参数覆盖这里的值。
# 改这个文件不需要重新编译。

[probe]
rate           = 50      # 单个目标 IP 的每秒发包上限（0 = 不限）。单台一轮探测约 5 个请求，
                         # 50 是远低于会触发目标防御的宽松兜底，主要防异常重试风暴。
timeout_per_ip = "8s"    # 单 IP 探测超时（对一台主机最长等待）
concurrency    = 16      # 全局并发探测数

[scan]
deadline = "0"           # 整个扫描任务的总时长上限，0 = 不限。到点即停、已扫出结果。
ports    = [18789]       # 默认端口（命令行 --port 可传多个）

[output]
verbose = 0              # 默认日志详度：0 = 每目标一行结论；1 = -l 完整研判依据
