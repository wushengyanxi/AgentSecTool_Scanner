<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw 实例收集看板</title>
<style>
  :root{
    --bg:#F2F3F5; --card:#FFFFFF; --ink:#3A4253; --ink-strong:#2B3242; --muted:#9097A4;
    --line:#ECEDF1; --hair:#F4F5F7;
    --indigo:#5C6AC4; --indigo-2:#7F8BD4; --indigo-3:#AAB2E2; --indigo-4:#D6DAF0;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased;}
  /* 自适应宽度：占满屏宽（留合理边距），超宽屏才封顶，不再把内容挤在中间 */
  .wrap{max-width:1760px;margin:0 auto;padding:22px 40px 80px;}
  .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;position:relative;}
  h1{font-size:21px;font-weight:700;color:var(--ink-strong);margin:0;display:flex;align-items:center;gap:7px;}
  .info-dot{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--muted);color:var(--muted);font-size:10px;display:inline-flex;align-items:center;justify-content:center;font-weight:600;}
  .tabs{display:flex;gap:26px;border-bottom:1px solid var(--line);margin-bottom:22px;}
  .tab{padding:9px 1px;color:var(--muted);font-size:14px;cursor:default;border-bottom:2px solid transparent;margin-bottom:-1px;}
  .tab.active{color:var(--ink-strong);border-bottom-color:var(--indigo);font-weight:600;}
  /* 右上角 BLUE-LOTUS 品牌标识（纯展示，浏览器自带刷新即可） */
  /* 绝对定位脱离文档流：怎么挪都不影响左侧标题；top 控制下移量，让花瓣顶点落到标题上半边高度 */
  .logo{height:78px;width:auto;display:block;position:absolute;right:0;top:6px;}

  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:18px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:7px;padding:20px 22px;position:relative;min-height:108px;overflow:hidden;}
  .card .k{color:var(--muted);font-size:13px;margin-bottom:10px;font-weight:500;}
  .card .v{font-size:32px;font-weight:700;line-height:1;color:var(--ink-strong);letter-spacing:-.01em;}
  .card .v small{font-size:13px;font-weight:400;color:var(--muted);margin-left:5px;letter-spacing:0;}
  .card .ico{position:absolute;right:18px;bottom:14px;color:var(--indigo-4);}

  .row2{display:grid;grid-template-columns:1.55fr 1fr;gap:18px;margin-bottom:18px;}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:7px;padding:20px 22px;}
  .panel h3{margin:0 0 18px;font-size:14.5px;font-weight:600;color:var(--ink-strong);}
  .panel h3.mt{margin-top:24px;}

  /* 条形图：克制的靛蓝、细 */
  .bars{display:flex;flex-direction:column;gap:11px;}
  .bar-row{display:grid;grid-template-columns:84px 1fr 46px;align-items:center;gap:12px;font-size:12.5px;}
  .bar-row .label{color:var(--ink);font-family:var(--mono);text-align:right;}
  .bar-track{background:var(--hair);border-radius:3px;height:14px;overflow:hidden;}
  .bar-fill{height:100%;background:var(--indigo-2);border-radius:3px;}
  .bar-row .num{color:var(--muted);text-align:right;font-variant-numeric:tabular-nums;}
  /* 可悬停解释的标签：无虚线，help 光标暗示有说明；纯 CSS tooltip，0.3s 后浮出 */
  .hint{position:relative;cursor:help;}
  .hint::after{
    content:attr(data-tip);
    position:absolute;left:50%;bottom:calc(100% + 8px);transform:translateX(-50%);
    background:var(--ink-strong);color:#fff;font-size:12px;line-height:1.5;font-family:var(--sans);
    padding:7px 10px;border-radius:6px;width:max-content;max-width:230px;white-space:normal;text-align:left;
    box-shadow:0 4px 14px rgba(43,50,66,.18);
    opacity:0;visibility:hidden;pointer-events:none;z-index:20;
    transition:opacity .12s ease;
  }
  /* 小三角箭头 */
  .hint::before{
    content:"";position:absolute;left:50%;bottom:calc(100% + 3px);transform:translateX(-50%);
    border:5px solid transparent;border-top-color:var(--ink-strong);
    opacity:0;visibility:hidden;pointer-events:none;z-index:20;transition:opacity .12s ease;
  }
  /* 悬停 0.3s 后再显示（delay 在 hover 上，移开立即消失） */
  .hint:hover::after,.hint:hover::before{opacity:1;visibility:visible;transition-delay:.3s;}

  /* 研判标记的悬停提示：tooltip 文字是真实 DOM 子节点（.tipbox），不靠 ::after content，
     在表格展开行里也能稳定显示、不被裁空。
     向下弹出（标记位于展开区顶部 meta 行，向上弹会冲出展开行被上方表格行遮成黑块）。 */
  .tipw{position:relative;cursor:help;border-bottom:1px dotted var(--indigo-3);}
  .tipbox{
    position:absolute;left:50%;top:calc(100% + 9px);transform:translateX(-50%);
    background:var(--ink-strong);color:#fff;font-family:var(--sans);font-size:12px;line-height:1.55;
    font-weight:400;letter-spacing:0;text-align:left;white-space:normal;width:max-content;max-width:260px;
    padding:8px 11px;border-radius:7px;box-shadow:0 6px 18px rgba(43,50,66,.22);
    opacity:0;visibility:hidden;pointer-events:none;z-index:50;transition:opacity .12s ease;}
  .tipbox::after{content:"";position:absolute;left:50%;bottom:100%;transform:translateX(-50%);
    border:5px solid transparent;border-bottom-color:var(--ink-strong);}
  .tipw:hover .tipbox{opacity:1;visibility:visible;transition-delay:.3s;}

  /* 可信级别：同一靛蓝的深浅，不用多色 */
  .stack{display:flex;height:24px;border-radius:4px;overflow:hidden;}
  .stack > div{display:flex;align-items:center;justify-content:center;color:#fff;font-size:11.5px;white-space:nowrap;font-variant-numeric:tabular-nums;}
  .legend{display:flex;flex-wrap:wrap;gap:16px;margin-top:14px;font-size:12.5px;}
  .legend span{display:inline-flex;align-items:center;gap:7px;color:var(--muted);}
  .dot{width:9px;height:9px;border-radius:2px;display:inline-block;}

  /* 地理占位 */
  .geo-placeholder{height:200px;border:1.5px dashed var(--line);border-radius:8px;display:flex;
    align-items:center;justify-content:center;color:var(--muted);font-size:13px;background:#FAFBFC;}

  /* 表格 */
  .filters{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
  .filters select,.filters input{border:1px solid var(--line);border-radius:5px;padding:7px 11px;font-size:13px;background:#fff;color:var(--ink);}
  .filters input{width:210px;}
  .filters input::placeholder{color:#B4B9C4;}
  /* table-layout:fixed + colgroup 定死列宽 → 翻页内容变化时列不抖 */
  table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed;}
  th{text-align:left;color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;padding:8px 10px;border-bottom:1px solid var(--line);}
  td{padding:9px 10px;border-bottom:1px solid #F0F1F4;font-variant-numeric:tabular-nums;
     overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  td.ip{font-family:var(--mono);}
  /* 7 列等宽（固定不随内容变，翻页不抖）*/
  col.c-ip,col.c-port,col.c-cat,col.c-ver,col.c-src,col.c-prov,col.c-ts{width:14.28%;}
  tr:hover td{background:#FAFBFD;}
  /* 研判标签：靛蓝深浅 + 一个中性灰，不堆多色 */
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;padding:2px 9px;border-radius:4px;font-weight:500;}
  .pill::before{content:"";width:6px;height:6px;border-radius:50%;}
  .pill.confirmed{background:#EEF0FA;color:#4954A8;}
  .pill.confirmed::before{background:var(--indigo);}
  .pill.confirmed_no_version{background:#F1F2F7;color:#6B7385;}
  .pill.confirmed_no_version::before{background:var(--indigo-3);}
  .pill.suspect{background:#F4F5F7;color:#9097A4;}
  .pill.suspect::before{background:#C2C7D2;}
  .src{font-family:var(--mono);font-size:11.5px;color:var(--muted);}
  /* 资产行可双击展开 */
  tbody tr.asset{cursor:pointer;}
  tbody tr.asset.open td{background:#F5F6FB;}
  /* 报告展开行：整行铺一个浅底容器 */
  td.report-cell{padding:0;background:#FAFBFD;border-bottom:1px solid var(--line);}
  .report{padding:16px 18px;}
  .report .meta{display:flex;flex-wrap:wrap;gap:8px 18px;margin-bottom:14px;font-size:12.5px;color:var(--ink);}
  .report .meta b{color:var(--ink-strong);font-weight:600;}
  .report .meta .mono{font-family:var(--mono);}
  .report-title{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin:0 0 8px;}
  /* 版本来源说明 */
  .ver-note{font-size:12.5px;color:var(--ink);background:#F6F7FC;border-radius:6px;padding:9px 12px;margin-bottom:8px;line-height:1.6;}
  /* 结论依据：报告概况下方一段说明 */
  /* 研判小结：探针之后收口达标逻辑 */
  .summary-line{background:#F1F2F7;border-radius:6px;padding:12px 14px;margin-top:14px;}
  .summary-line h5{margin:0 0 6px;font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
  .summary-line p{margin:0;font-size:12.5px;color:var(--ink);line-height:1.65;}
  /* 测试项说明段：浅靛蓝底，和原始请求/响应区分开 */
  .probe-body .seg.desc{background:#F6F7FC;}
  .probe-body .seg.desc p{margin:0;font-size:12.5px;line-height:1.65;color:var(--ink);
    white-space:normal;word-break:break-word;overflow-wrap:anywhere;}
  /* 单个测试项行：左 > 三角，可点击再展开请求/响应 */
  .probe{border:1px solid var(--line);border-radius:6px;margin-bottom:7px;background:#fff;overflow:hidden;}
  .probe-head{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;font-size:13px;}
  .probe-head:hover{background:#FAFBFD;}
  .probe-head .caret{display:inline-block;width:10px;color:var(--muted);transition:transform .15s;font-family:var(--mono);}
  .probe.open .caret{transform:rotate(90deg);}
  .probe-head .pname{color:var(--ink-strong);font-weight:600;min-width:150px;}
  .probe-head .pid{font-family:var(--mono);font-size:11.5px;color:var(--muted);}
  .probe-head .hit{font-size:11px;padding:1px 8px;border-radius:4px;margin-left:auto;}
  .probe-head .hit.y{background:#EEF0FA;color:#4954A8;}
  .probe-head .hit.n{background:#F4F5F7;color:#9097A4;}
  .probe-body{display:none;border-top:1px solid var(--line);}
  .probe.open .probe-body{display:block;}
  .probe-body .seg{padding:10px 12px;}
  .probe-body .seg + .seg{border-top:1px solid var(--hair);}
  .probe-body .seg h5{margin:0 0 6px;font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
  /* 请求/响应原文：正常字色，仅关键特征词（.kw）染淡紫 */
  .probe-body pre{margin:0;font-family:var(--mono);font-size:12px;line-height:1.5;color:var(--ink);
    background:var(--hair);border-radius:5px;padding:10px 12px;max-height:280px;overflow:auto;
    white-space:pre-wrap;word-break:break-all;}
  /* 关键特征词：观测/请求/响应三处统一的淡紫高亮 */
  .kw{color:var(--indigo);font-weight:600;}
  .report .loading{color:var(--muted);font-size:13px;padding:6px 0;}
  .pager{display:flex;gap:8px;align-items:center;justify-content:flex-end;margin-top:16px;color:var(--muted);font-size:12.5px;}
  .pager button{border:1px solid var(--line);background:#fff;border-radius:5px;padding:5px 12px;cursor:pointer;font-size:12.5px;color:var(--ink);}
  .pager button:hover:not(:disabled){border-color:var(--indigo-3);}
  .pager button:disabled{opacity:.4;cursor:default;}

  @media (max-width:1000px){.cards{grid-template-columns:repeat(2,1fr);}.row2{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>OpenClaw 实例收集 <span class="info-dot">i</span></h1>
    <img class="logo" src="/assets/blue-lotus.png" alt="BLUE-LOTUS">
  </div>

  <div class="tabs">
    <div class="tab active">总览</div>
    <div class="tab">资产列表</div>
  </div>

  <!-- 数字卡 -->
  <div class="cards" id="cards"></div>

  <!-- 图表行 -->
  <div class="row2">
    <div class="panel">
      <h3>版本分布（明确 OpenClaw 实例）</h3>
      <div class="bars" id="versions"></div>
    </div>
    <div class="panel">
      <h3>可信级别分桶</h3>
      <div class="stack" id="stack"></div>
      <div class="legend" id="legend"></div>
      <h3 class="mt">版本来源</h3>
      <div class="bars" id="sources"></div>
    </div>
  </div>

  <!-- 地理占位 -->
  <div class="panel" style="margin-bottom:18px;">
    <h3>地理分布</h3>
    <div class="geo-placeholder">地理分布（按省/ASN）—— 待实现：将跨库 join FOFA 库补全实例 IP 的归属</div>
  </div>

  <!-- 资产列表 -->
  <div class="panel">
    <h3>资产列表</h3>
    <div class="filters">
      <select id="fCat" onchange="loadAssets(0)">
        <option value="">全部级别</option>
        <option value="confirmed">确认（含版本）</option>
        <option value="confirmed_no_version">确认（版本待定）</option>
        <option value="suspect">疑似</option>
      </select>
      <input id="fQ" placeholder="搜 IP / 版本…" oninput="debouncedSearch()">
      <span id="assetTotal" style="color:var(--muted);font-size:12.5px;"></span>
    </div>
    <table>
      <colgroup>
        <col class="c-ip"><col class="c-port"><col class="c-cat"><col class="c-ver">
        <col class="c-src"><col class="c-prov"><col class="c-ts">
      </colgroup>
      <thead><tr>
        <th>IP</th><th>端口</th><th>研判</th><th>版本</th><th>版本来源</th><th>省份</th><th>披露日期</th>
      </tr></thead>
      <tbody id="assetRows"></tbody>
    </table>
    <div class="pager">
      <button id="prev" onclick="pageMove(-1)">上一页</button>
      <span id="pageInfo"></span>
      <button id="next" onclick="pageMove(1)">下一页</button>
    </div>
  </div>
</div>

<script>
// 同一靛蓝的深浅，不用多色（深→浅 = 可信度高→低）
const CAT_COLOR = {confirmed:'#5C6AC4', confirmed_no_version:'#8F99D8', suspect:'#C5CAE6'};
const CAT_LABEL = {confirmed:'确认（含版本）', confirmed_no_version:'确认（版本待定）', suspect:'疑似'};
// 版本来源各项的通俗解释（鼠标悬停浮出）
const SRC_TIPS = {
  'direct': '直接读到版本号：服务在响应里明文给出了版本',
  'implicit': '指纹反推：用资产指纹比对，推断出确切版本号',
  'implicit-range': '区间反推：指纹只能定位到一个版本范围，无法精确到某一版',
  '(无)': '确认是 OpenClaw，但这台主机未能取到任何版本信息',
};
let PAGE = 0, LIMIT = 50, ASSET_TOTAL = 0;

async function getJSON(u){ const r = await fetch(u); return r.json(); }

function fmt(n){ return (n||0).toLocaleString(); }

async function loadOverview(){
  const d = await getJSON('/api/overview');
  if(d.error){ document.getElementById('cards').innerHTML = '<div class="card"><div class="k">错误</div><div class="v" style="font-size:15px">'+d.error+'</div></div>'; return; }
  const cats = Object.fromEntries(d.categories.map(c=>[c.key,c.count]));
  // 数字卡：统一墨色数字 + 右下角极淡线描图标，不用多色
  const ICO = {
    host:'<svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="3" y="4" width="18" height="12" rx="1.5"/><line x1="8" y1="20" x2="16" y2="20"/><line x1="12" y1="16" x2="12" y2="20"/></svg>',
    check:'<svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M20 6L9 17l-5-5"/></svg>',
    ver:'<svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
    eye:'<svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>',
  };
  document.getElementById('cards').innerHTML = `
    <div class="card"><div class="k">明确 OpenClaw 实例</div><div class="v">${fmt(d.openclaw_total)}<small>台</small></div><div class="ico">${ICO.host}</div></div>
    <div class="card"><div class="k">确认（含版本）</div><div class="v">${fmt(cats.confirmed)}</div><div class="ico">${ICO.check}</div></div>
    <div class="card"><div class="k">确认（版本待定）</div><div class="v">${fmt(cats.confirmed_no_version)}</div><div class="ico">${ICO.ver}</div></div>
    <div class="card"><div class="k">疑似（待复核）</div><div class="v">${fmt(cats.suspect)}</div><div class="ico">${ICO.eye}</div></div>`;
  // 版本条形图（top 12）
  renderBars('versions', d.versions.slice(0,12));
  renderBars('sources', d.version_sources, SRC_TIPS);
  // 分桶堆叠条
  const total = d.categories.reduce((s,c)=>s+c.count,0) || 1;
  document.getElementById('stack').innerHTML = d.categories.map(c=>{
    const w = (c.count/total*100).toFixed(1);
    return `<div style="width:${w}%;background:${CAT_COLOR[c.key]}" title="${c.label}: ${c.count}">${w>8?fmt(c.count):''}</div>`;
  }).join('');
  document.getElementById('legend').innerHTML = d.categories.map(c=>
    `<span><i class="dot" style="background:${CAT_COLOR[c.key]}"></i>${c.label} ${fmt(c.count)}</span>`).join('');
}

function renderBars(id, items, tips){
  const max = Math.max(1, ...items.map(i=>i.count));
  document.getElementById(id).innerHTML = items.map(i=>{
    const label = i.version ?? i.source;
    // 有解释的标签（版本来源）：纯 CSS tooltip（data-tip），无虚线、0.3s 后浮出
    const tip = tips && tips[label];
    const lbl = tip
      ? `<span class="hint" data-tip="${tip}">${label}</span>`
      : label;
    return `<div class="bar-row"><div class="label">${lbl}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(i.count/max*100).toFixed(1)}%"></div></div>
      <div class="num">${fmt(i.count)}</div></div>`;
  }).join('');
}

async function loadAssets(page){
  PAGE = page;
  const cat = document.getElementById('fCat').value;
  const q = document.getElementById('fQ').value.trim();
  const u = `/api/assets?limit=${LIMIT}&offset=${page*LIMIT}` +
            (cat?`&category=${cat}`:'') + (q?`&q=${encodeURIComponent(q)}`:'');
  const d = await getJSON(u);
  ASSET_TOTAL = d.total;
  document.getElementById('assetTotal').textContent = `共 ${fmt(d.total)} 台`;
  document.getElementById('assetRows').innerHTML = d.rows.map(r=>`
    <tr class="asset" data-ip="${r.ip}" data-port="${r.port}" ondblclick="toggleReport(this)" title="双击展开探测报告">
      <td class="ip">${r.ip}</td><td>${r.port}</td>
      <td><span class="pill ${r.category}">${CAT_LABEL[r.category]||r.category}</span></td>
      <td>${r.latest_version||'<span style="color:var(--muted)">—</span>'}</td>
      <td>${srcCell(r.version_source)}</td>
      <td>${r.province||'—'}</td>
      <td>${r.disclosed||'—'}</td>
    </tr>`).join('') || '<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:24px">无数据</td></tr>';
  const pages = Math.max(1, Math.ceil(d.total/LIMIT));
  document.getElementById('pageInfo').textContent = `第 ${page+1} / ${pages} 页`;
  document.getElementById('prev').disabled = page<=0;
  document.getElementById('next').disabled = (page+1)>=pages;
}

// HTML 转义：报告里的请求/响应是探测目标返回的内容，不可信，必须转义防 XSS
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g,c=>(
  {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// 先 esc，再把后端给的「特征词」在文本里高亮成淡紫（观测/请求/响应三处用同一组词，一眼对应）。
// 正则转义，避免特征词里的特殊字符破坏匹配。
function hl(text, words){
  let s = esc(text);
  for(const w of (words||[])){
    if(!w) continue;
    const ew = esc(w).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    s = s.replace(new RegExp(ew,'g'), m=>`<span class="kw">${m}</span>`);
  }
  return s;
}

// 版本来源单元格：英文标签 + 悬停解释（复用 SRC_TIPS / .hint tooltip）；无来源显示 —
function srcCell(src){
  if(!src) return '<span style="color:var(--muted)">—</span>';
  const tip = SRC_TIPS[src];
  return tip ? `<span class="hint src" data-tip="${esc(tip)}">${esc(src)}</span>`
             : `<span class="src">${esc(src)}</span>`;
}

// 双击资产行 → 在其下方插入/移除报告行
function toggleReport(tr){
  const next = tr.nextElementSibling;
  if(next && next.classList.contains('report-row')){   // 已展开 → 收起
    next.remove(); tr.classList.remove('open'); return;
  }
  // 关掉其它已展开的报告（一次只展开一台，列表更清爽）
  document.querySelectorAll('tr.report-row').forEach(r=>r.remove());
  document.querySelectorAll('tr.asset.open').forEach(r=>r.classList.remove('open'));
  tr.classList.add('open');
  const ip = tr.dataset.ip, port = tr.dataset.port;
  const row = document.createElement('tr');
  row.className = 'report-row';
  row.innerHTML = `<td class="report-cell" colspan="6"><div class="report">
    <div class="loading">正在加载 ${esc(ip)}:${esc(port)} 的探测报告…</div></div></td>`;
  tr.after(row);
  loadReport(row.querySelector('.report'), ip, port);
}

async function loadReport(box, ip, port){
  let d;
  try{ d = await getJSON(`/api/report?ip=${encodeURIComponent(ip)}&port=${encodeURIComponent(port)}`); }
  catch(e){ box.innerHTML = `<div class="loading">报告加载失败：${esc(e.message)}</div>`; return; }
  if(d.error){ box.innerHTML = `<div class="loading">${esc(d.error)}</div>`; return; }
  const TM = d.test_meanings || {};
  // 把 T1/T3/C1 等带含义的标记包成可悬停（tooltip 用真实 DOM 子节点，避免 ::after content 在表格里被裁/取空）
  const tipMark = m => TM[m]
    ? `<span class="tipw">${esc(m)}<span class="tipbox">${esc(TM[m])}</span></span>`
    : esc(m);
  const matchedHtml = (d.matched||[]).map(tipMark).join('、') || '—';
  const ruleHtml = d.rule ? tipMark(d.rule) : '—';
  const meta = `<div class="meta">
    <span><b>${esc(d.ip)}:${esc(d.port)}</b></span>
    <span>研判 <b>${CAT_LABEL[d.category]||esc(d.category)||'—'}</b></span>
    <span>版本 <b class="mono">${esc(d.version)||'—'}</b>${d.version_source?` <span class="src">(${esc(d.version_source)})</span>`:''}</span>
    <span>规则 <b class="mono">${ruleHtml}</b></span>
    <span>命中 <b class="mono">${matchedHtml}</b></span>
    <span>探测时间 <span class="mono">${esc((d.ts||'').replace('T',' ').replace('Z',''))}</span></span>
  </div>`;
  const probes = (d.probes||[]).map(p=>{
    const hls = p.highlights||[];
    return `
    <div class="probe">
      <div class="probe-head" onclick="this.parentElement.classList.toggle('open')">
        <span class="caret">&gt;</span>
        <span class="pname">${esc(p.name||p.test_id)}</span>
        <span class="pid">${esc(p.test_id)}</span>
        <span class="hit ${p.hit?'y':'n'}">${p.hit?'命中':'未命中'}</span>
      </div>
      <div class="probe-body">
        ${p.desc?`<div class="seg desc"><h5>观测</h5><p>${hl(p.desc,hls)}</p></div>`:''}
        <div class="seg"><h5>请求</h5><pre>${hl(p.request,hls)||'<span style="color:var(--muted)">（无）</span>'}</pre></div>
        <div class="seg"><h5>响应</h5><pre>${hl(p.response,hls)||'<span style="color:var(--muted)">（无）</span>'}</pre></div>
      </div>
    </div>`;}).join('');
  const verNote = d.version_note ? `<div class="ver-note">${esc(d.version_note)}</div>` : '';
  // 研判小结：达标逻辑（C1/C2、证据级别）收口在探针之后讲一次
  const summary = d.summary ? `<div class="summary-line"><h5>研判小结</h5><p>${esc(d.summary)}</p></div>` : '';
  box.innerHTML = meta + verNote
    + `<p class="report-title">探针 · 逐项观测（点击展开）</p>`
    + (probes || '<div class="loading">无测试项记录</div>')
    + summary;
}

function pageMove(dir){ loadAssets(Math.max(0, PAGE+dir)); }
let _t; function debouncedSearch(){ clearTimeout(_t); _t=setTimeout(()=>loadAssets(0), 300); }

function loadAll(){ loadOverview(); loadAssets(0); }
loadAll();
</script>
