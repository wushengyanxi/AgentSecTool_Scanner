# 报告话术模板 —— 每个测试项穷举其「有语义区别」的状态，各配一段半写死话术。
# {} 是变量槽，渲染时由实际探测值填入（如 {version}、{title}）。
# 话术与判定逻辑解耦：True/False 永远由白名单 C1/C2 机判，本文件只负责把结果解释成人话。
# 非技术人员可直接改这里的措辞，不必动代码、不必重编译。
# 状态枚举取自真实探测中实际出现过的状态。

[T1]  # control-ui-config 端点（确证级来源）
status_200_version   = "control-ui-config 返回 200 并自报 serverVersion={version}，服务端运行时身份，确证级。"
status_200_noversion = "control-ui-config 返回 200 但无 serverVersion 字段（该版本尚未引入），转指纹反推。"
status_401           = "control-ui-config 返回 401，端点存在但已启用鉴权（v2026.4.22+），无法直读版本。"
status_404           = "control-ui-config 返回 404，未发现该特异端点。"
no_response          = "control-ui-config 无响应。"

[T2]  # WS connect.challenge（强证据）
hit  = "WebSocket 握手收到 connect.challenge 协议事件，OpenClaw 强特征。"
miss = "WebSocket 升级后未收到 connect.challenge。"

[T3]  # control-ui 401（强证据，HTTP 路由面）
hit  = "control-ui-config 端点以 401 响应，特异路由存在。"
miss = "control-ui-config 未以 401 响应。"

[T4]  # /healthz 特征体（强证据，HTTP 路由面）
hit  = "/healthz 返回特征健康体（status:live, ok:true）。"
miss = "/healthz 未返回特征体。"

[T5]  # favicon MD5（弱证据，可静态伪造）
hit  = "favicon 命中品牌 MD5。"
miss = "favicon 未命中品牌 MD5。"

[T6]  # 首页 title（弱证据，可静态伪造）
openclaw = "首页标题为 OpenClaw Control。"
variant  = "首页标题为 {title}，非标准 OpenClaw Control，疑为改名/分叉变体（如 Clawdbot、Moltbot）。"
none     = "未取到首页标题。"

[T7]  # 响应头三件套（弱证据，常见框架默认）
hit  = "命中响应头三件套（X-Content-Type-Options / Referrer-Policy / Permissions-Policy）。"
miss = "未命中响应头三件套。"

[verdict]  # 结论收尾话术
true_c1  = "依据：命中确证级证据 T1（control-ui 自报版本），满足 C1 → True。"
true_c2  = "依据：命中跨表面双强证据（T2 WS 面 + HTTP 路由面强证据），满足 C2 → True。"
false    = "依据：命中 {matched}，不满足白名单 C1（需 T1）与 C2（需 T2 且跨到 HTTP 路由面）→ False。完整请求/响应已入库，可复查或调白名单重判。"
down     = "依据：探不到目标（{error_type}），无任何 OpenClaw 证据 → False。"
