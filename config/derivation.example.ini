[openai]
# Copy this file to config/derivation.ini and provide the key locally.
api_key =
base_url = https://api.openai.com/v1
model = gpt-5.6
reasoning_effort = high
timeout_seconds = 300

[authorization]
# Project-level authorization for sending imported task materials to the model.
allow_external_model = false

[research]
# Web search is restricted to these trusted source families.
allowed_domains = github.com, docs.github.com, docker.com, hub.docker.com
