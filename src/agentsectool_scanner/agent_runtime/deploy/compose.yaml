name: agentsectool-scanner-agent

services:
  postgres:
    image: postgres:16.9-alpine@sha256:7c688148e5e156d0e86df7ba8ae5a05a2386aaec1e2ad8e6d11bdf10504b1fb7
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
    volumes:
      - litellm-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s
    restart: unless-stopped

  litellm:
    image: ghcr.io/berriai/litellm:v1.83.7-stable@sha256:af0152ca6dfb6703b35c0d4899effa9ac132bce9a4fbcbe1dc6ef145c100db26
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    env_file:
      - path: .env
        required: false
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness', timeout=2).read()
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 10s
    restart: unless-stopped

volumes:
  litellm-postgres:
