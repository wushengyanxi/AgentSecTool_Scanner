; MaxMind GeoLite2 凭据与库路径配置模板。
; 复制为 geoip/geoip.ini 并填入真实 account_id / license_key。
; geoip/geoip.ini 已在 .gitignore 中，绝不入库。
;
; license_key 在 maxmind.com → My Account → Manage License Keys 生成（GeoLite2 免费）。
[maxmind]
account_id  = YOUR_ACCOUNT_ID
license_key = YOUR_LICENSE_KEY

; 下载并解包后的 City 库存放路径（相对项目根）。
[geoip]
city_db = data/geoip/GeoLite2-City.mmdb
